<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#05080f" />
    <title>Page Not Found | Auriora</title>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/assets/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="error-page">
    <header class="site-header" aria-label="Site header">
      <a class="wordmark" href="/" aria-label="Auriora home">Auriora</a>
    </header>

    <main>
      <section class="band band-dark error-band" aria-labelledby="error-title">
        <div class="band-visual" aria-hidden="true"></div>
        <div class="band-inner error-inner">
          <p class="eyebrow">404 · Signal not found</p>
          <h1 id="error-title">This path leads beyond the current map.</h1>
          <p class="error-copy">
            The page may have moved, or it may not exist yet. Return to the
            beginning to continue exploring.
          </p>
          <a class="link-arrow error-action" href="/">Return to Auriora</a>
        </div>
      </section>
    </main>
  </body>
</html>
